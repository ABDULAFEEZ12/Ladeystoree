<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product · LADEY STOREE</title>

  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ash: #B8B8B8;
      --ash-dark: #9E9E9E;
      --charcoal: #1A1A1A;
      --charcoal-soft: #0D0D0D;
      --charcoal-light: #2A2A2A;
      --white-pure: #FFFFFF;
      --off-white: #FAFAFA;
      --border-light: rgba(184, 184, 184, 0.2);
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--charcoal-soft);
      color: var(--off-white);
      line-height: 1.6;
      padding: 32px 5%;
      min-height: 100vh;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--white-pure);
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 1.5rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .section {
      background: var(--charcoal-light);
      border: 1px solid var(--border-light);
      padding: 2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-group label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--ash);
    }

    input, select, textarea {
      background: var(--charcoal);
      border: 1px solid var(--border-light);
      padding: 12px 16px;
      color: var(--white-pure);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--ash);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: transparent;
      border: 1px solid var(--ash-dark);
      color: var(--ash);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      margin-top: 1.5rem;
    }

    .btn-primary {
      background: var(--ash);
      color: var(--charcoal);
      border-color: var(--ash);
    }

    .btn-primary:hover {
      background: var(--white-pure);
      border-color: var(--white-pure);
    }

    .btn-secondary {
      margin-left: 1rem;
    }

    .btn-secondary:hover {
      background: var(--ash);
      color: var(--charcoal);
    }

    .current-image {
      margin-top: 0.5rem;
    }

    .current-image img {
      max-width: 150px;
      border-radius: 4px;
    }

    .flash {
      padding: 14px 20px;
      margin-bottom: 1.5rem;
      background: var(--charcoal-light);
      border-left: 3px solid var(--ash);
      color: var(--off-white);
      font-size: 0.8rem;
    }

    .flash.error {
      border-left-color: #E8A0A0;
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .form-group.full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Edit Product</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="section">
    <form method="POST" action="{{ url_for('edit_product', product_id=product._id) }}" enctype="multipart/form-data">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Product Name *</label>
          <input type="text" name="name" value="{{ product.name }}" required>
        </div>
        
        <div class="form-group">
          <label>Price (₦) *</label>
          <input type="number" name="price" value="{{ product.price }}" step="0.01" min="0" required>
        </div>
        
        <div class="form-group">
          <label>Category *</label>
          <select name="category" required>
            <option value="New Arrivals" {% if product.category == 'New Arrivals' %}selected{% endif %}>New Arrivals</option>
            <option value="Dresses" {% if product.category == 'Dresses' %}selected{% endif %}>Dresses</option>
            <option value="Tops" {% if product.category == 'Tops' %}selected{% endif %}>Tops</option>
            <option value="Knitwear" {% if product.category == 'Knitwear' %}selected{% endif %}>Knitwear</option>
            <option value="Outerwear" {% if product.category == 'Outerwear' %}selected{% endif %}>Outerwear</option>
            <option value="Trousers" {% if product.category == 'Trousers' %}selected{% endif %}>Trousers</option>
            <option value="Skirts" {% if product.category == 'Skirts' %}selected{% endif %}>Skirts</option>
            <option value="Accessories" {% if product.category == 'Accessories' %}selected{% endif %}>Accessories</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Stock *</label>
          <input type="number" name="stock" value="{{ product.stock }}" min="0" required>
        </div>
        
        <div class="form-group full-width">
          <label>Product Image (leave empty to keep current)</label>
          <input type="file" name="image" accept="image/*">
          {% if product.image %}
          <div class="current-image">
            <p style="color: var(--ash-dark); font-size: 0.7rem; margin: 8px 0 4px;">Current image:</p>
            <img src="{{ product.image }}" alt="{{ product.name }}">
          </div>
          {% endif %}
        </div>
        
        <div class="form-group full-width">
          <label>Description</label>
          <textarea name="description">{{ product.description or '' }}</textarea>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary">
        <i class="ri-save-line"></i> Save Changes
      </button>
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
        <i class="ri-arrow-left-line"></i> Cancel
      </a>
    </form>
  </div>
</div>

</body>
</html>
