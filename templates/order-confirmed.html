<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<title>Order Confirmed · Ladey Storee</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
<style>
  :root {
    --ash: #B8B8B8; --ash-dark: #9E9E9E; --charcoal: #1A1A1A;
    --white-pure: #FFFFFF; --off-white: #FAFAFA;
    --font-script: 'Dancing Script', cursive; --font-serif: 'Cormorant Garamond', serif; --font-sans: 'Inter', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    background: linear-gradient(135deg, var(--off-white) 0%, var(--white-pure) 100%);
    color: var(--charcoal); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; text-align: center;
  }
  .confirmed-box {
    background: var(--white-pure); border-radius: 28px; padding: 50px 40px;
    max-width: 550px; width: 100%;
    border: 1px solid rgba(184,184,184,0.2);
    box-shadow: 0 20px 35px -15px rgba(0,0,0,0.08);
  }
  .check-icon { font-size: 5rem; color: #4CAF50; margin-bottom: 1rem; animation: bounceIn 0.6s; }
  @keyframes bounceIn { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
  h1 { font-family: var(--font-script); font-size: 3rem; margin-bottom: 10px; color: var(--charcoal); }
  h2 { font-family: var(--font-serif); font-size: 1.5rem; font-weight: 400; color: #555; margin-bottom: 30px; }
  .ref-code { background: #f0f0f0; border: 1px solid #ddd; padding: 12px 24px; border-radius: 40px; display: inline-block; font-size: 1.2rem; letter-spacing: 2px; color: var(--charcoal); margin: 15px 0; font-weight: 600; }
  .order-details { text-align: left; margin: 20px 0; padding: 20px; background: #fafafa; border-radius: 16px; font-size: 0.9rem; color: #555; display: none; }
  .order-details p { margin: 6px 0; }
  .order-details strong { color: var(--charcoal); }
  .info-box { background: #f0f7f0; border: 1px solid #4CAF50; padding: 15px 20px; border-radius: 12px; margin-top: 20px; font-size: 0.85rem; color: #2E7D32; text-align: left; }
  .info-box i { color: #4CAF50; margin-right: 8px; }
  .back-link { display: inline-block; margin-top: 25px; color: var(--charcoal); font-size: 0.85rem; text-decoration: none; padding: 12px 30px; border: 2px solid var(--charcoal); border-radius: 40px; transition: all 0.2s; }
  .back-link:hover { background: var(--charcoal); color: #fff; }
</style>
</head>
<body>

<div class="confirmed-box">
  <div class="check-icon">✅</div>
  <h1>Payment Successful!</h1>
  <h2>Thank you for your order</h2>
  
  <p style="color: #555;">Your Order Reference:</p>
  <div class="ref-code" id="orderRef">Processing...</div>
  
  <div class="order-details" id="orderDetails">
    <p><strong>Name:</strong> <span id="detailName"></span></p>
    <p><strong>Phone:</strong> <span id="detailPhone"></span></p>
    <p><strong>Size:</strong> <span id="detailSize"></span></p>
    <p><strong>Color:</strong> <span id="detailColor"></span></p>
    <p><strong>Total Paid:</strong> <span id="detailTotal"></span></p>
  </div>
  
  <div class="info-box">
    <i class="ri-check-double-line"></i>
    <strong>Your order has been received!</strong><br>
    We will process your order shortly. No further action is needed from you.
  </div>
  
  <br>
  <a href="/" class="back-link">← Continue Shopping</a>
</div>

<script>
  const orderData = JSON.parse(localStorage.getItem("ladeyLastOrder") || "{}");
  
  if (orderData.reference) {
    document.getElementById("orderRef").innerText = orderData.reference;
    document.getElementById("orderDetails").style.display = "block";
    document.getElementById("detailName").innerText = orderData.name || 'N/A';
    document.getElementById("detailPhone").innerText = orderData.phone || 'N/A';
    document.getElementById("detailSize").innerText = orderData.size || 'N/A';
    document.getElementById("detailColor").innerText = orderData.color || 'Not specified';
    document.getElementById("detailTotal").innerText = '₦' + (orderData.total || 0).toLocaleString();

    // ✅ NOW save the order to database (only after successful payment)
    fetch('/save-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        reference: orderData.reference,
        customerName: orderData.name,
        customerPhone: orderData.phone,
        customerEmail: orderData.email || '',
        deliveryAddress: orderData.address,
        size: orderData.size,
        color: orderData.color,
        items: orderData.cart || [],
        totalAmount: orderData.total,
        paymentMethod: "SquadCo",
        status: "Pending"
      })
    }).then(res => res.json())
      .then(data => console.log("✅ Order saved after payment:", data))
      .catch(err => console.log("Save error:", err));
    
    // Clear cart and order data
    localStorage.removeItem("ladeyCart");
    localStorage.removeItem("ladeyLastOrder");
  } else {
    document.getElementById("orderRef").innerText = "Order Confirmed";
  }
</script>
</body>
</html>
